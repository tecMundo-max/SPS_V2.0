<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>SPS v2 - Login</title>

    <link rel="icon" href="assets/logo/favicon.ico">

    <link rel="stylesheet" href="css/reset.css">

    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/layout.css">

    <link rel="stylesheet" href="css/components.css">

    <link rel="stylesheet" href="css/forms.css">

</head>

<body>

    <main class="login-container">

        <section class="login-box">

            <div class="login-header">

                <img src="assets/logo/logo.png" alt="SPS v2" class="logo">

                <h1>SPS v2</h1>

                <p>Sistema de Controle de Chamados</p>

            </div>

            <form id="loginForm" autocomplete="off" novalidate>

                <div class="form-group">

                    <label for="email">

                        E-mail

                    </label>

                    <input id="email" name="email" type="email" placeholder="usuario@empresa.com" required>

                </div>

                <div class="form-group">

                    <label for="password">

                        Senha

                    </label>

                    <input id="password" name="password" type="password" placeholder="********" required>

                </div>

                <div class="form-options">

                    <button type="button" id="btnForgotPassword" class="link-button">

                        Esqueci minha senha

                    </button>

                </div>

                <button type="submit" id="btnLogin" class="btn btn-primary">

                    Entrar

                </button>

            </form>

            <div id="loginMessage" class="login-message">

            </div>

            <div id="loading" class="loading hidden">

                Autenticando...

            </div>

        </section>

    </main>

    <script type="module" src="js/bootstrap.js">

    </script>

</body>

</html>
