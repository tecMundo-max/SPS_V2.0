<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS v2 | Gestão de Usuários</title>

    <link rel="icon" href="assets/logo/favicon.ico">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
</head>

<body>

    <header class="topbar">

        <div class="topbar-left">
            <h1>Gestão de Usuários</h1>
        </div>

        <div class="topbar-right">
            <button id="btnLogout" class="btn-secondary">
Sair
</button>
        </div>

    </header>

    <main class="dashboard">

        <section class="card">

            <div class="card-header">

                <h2>Usuários</h2>

                <div class="actions">

                    <input type="search" id="searchUser" placeholder="Pesquisar usuário...">

                    <button id="btnNovoUsuario" class="btn-primary">

Novo Usuário

</button>

                </div>

            </div>

            <section id="userFormCard" class="card" hidden>

                <h3 id="formTitle">
                    Novo Usuário
                </h3>

                <form id="userForm">

                    <input type="hidden" id="uid">

                    <div class="form-group">

                        <label for="nome">

Nome

</label>

                        <input type="text" id="nome" required>

                    </div>

                    <div class="form-group">

                        <label for="email">

E-mail

</label>

                        <input type="email" id="email" required>

                    </div>

                    <div class="form-group">

                        <label for="perfil">

Perfil

</label>

                        <select id="perfil">

<option value="ANALISTA">
ANALISTA
</option>

<option value="SUPERVISOR">
SUPERVISOR
</option>

</select>

                    </div>

                    <div class="form-group">

                        <label>

Status

</label>

                        <label>

<input
type="checkbox"
id="ativo"
checked>

Usuário ativo

</label>

                    </div>

                    <div class="form-actions">

                        <button type="submit" class="btn-primary">

Salvar

</button>

                        <button type="button" id="btnCancelar" class="btn-secondary">

Cancelar

</button>

                    </div>

                </form>

            </section>

            <div class="table-responsive">

                <table class="table">

                    <thead>

                        <tr>

                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th>Último Login</th>
                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody id="usersTableBody">

                        <tr>

                            <td colspan="6">

                                Carregando usuários...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <script type="module" src="js/bootstrap.js"></script>
    <script type="module" src="js/pages/users.js"></script>

</body>

</html>
