<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS v2 - Dashboard</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tables.css">
</head>

<body>

    <header class="topbar">

        <div class="logo">
            <strong>SPS v2</strong>
        </div>

        <nav class="menu">

            <a href="dashboard.html" class="active">Dashboard</a>

            <a href="chamados.html">Chamados</a>

            <a href="encaminhamentos.html">Encaminhamentos</a>

            <a href="relatorios.html">Relatórios</a>

            <a href="usuarios.html">Usuários</a>

            <a href="configuracoes.html">Configurações</a>

        </nav>

        <div class="user-area">

            <span id="userName"></span>

            <button id="btnLogout">
            Sair
        </button>

        </div>

    </header>

    <main class="dashboard">

        <section class="cards">

            <article class="card">
                <h3>Chamados Abertos</h3>
                <span id="cardChamadosAbertos">0</span>
            </article>

            <article class="card">
                <h3>Encaminhamentos</h3>
                <span id="cardEncaminhamentos">0</span>
            </article>

            <article class="card">
                <h3>Em Análise</h3>
                <span id="cardAnalise">0</span>
            </article>

            <article class="card">
                <h3>Aguardando Retorno</h3>
                <span id="cardAguardando">0</span>
            </article>

            <article class="card">
                <h3>Respondidos</h3>
                <span id="cardRespondidos">0</span>
            </article>

            <article class="card">
                <h3>SLA Vencido</h3>
                <span id="cardSla">0</span>
            </article>

        </section>

        <section class="dashboard-table">

            <div class="table-header">

                <h2>Últimos Encaminhamentos</h2>

                <button id="btnAtualizar">
                Atualizar
            </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Status</th>

                        <th>Chamado</th>

                        <th>Título</th>

                        <th>Analista</th>

                        <th>Equipe</th>

                        <th>Atualização</th>

                        <th>Dias</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody id="dashboardTable">

                </tbody>

            </table>

        </section>

    </main>

    <footer class="footer">

        <span>SPS v2</span>

        <span id="systemVersion">Versão 2.0</span>

    </footer>

    <script type="module" src="js/bootstrap.js"></script>

</body>

</html>
